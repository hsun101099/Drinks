<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>點飲料吧！</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>

  <!-- ── Session Setup Overlay ── -->
  <div class="session-overlay hidden" id="sessionOverlay">
    <div class="session-box">
      <div class="session-icon">🧋</div>
      <h1 class="session-app-name">點飲料吧！</h1>

      <div class="stabs">
        <button class="stab active" id="stabCreate">建立新訂單</button>
        <button class="stab" id="stabJoin">加入訂單</button>
      </div>

      <div class="spanel active" id="createPanel">
        <label class="field-label">你的名字</label>
        <input class="field-input" id="createName" placeholder="例：阿明、小花…" maxlength="12" />
        <label class="field-label">設定密碼</label>
        <input class="field-input" id="createCode" placeholder="請輸入數字密碼" maxlength="10" inputmode="numeric" pattern="[0-9]*" />
        <button class="session-submit-btn" id="createBtn">下一步：選擇飲料店 →</button>
      </div>

      <div class="spanel" id="joinPanel">
        <label class="field-label">你的名字</label>
        <input class="field-input" id="joinName" placeholder="例：阿明、小花…" maxlength="12" />
        <label class="field-label">輸入訂單密碼</label>
        <input class="field-input" id="joinCode" placeholder="請輸入數字密碼" maxlength="10" inputmode="numeric" pattern="[0-9]*" />
        <p class="join-hint" id="joinHint"></p>
        <button class="session-submit-btn" id="joinBtn">加入訂單 →</button>
      </div>
    </div>
  </div>

  <!-- ── Toast Notification ── -->
  <div class="toast" id="toast"></div>

  <!-- ── Session Banner (live stats) ── -->
  <div class="session-banner" id="sessionBanner" style="display:none">
    <div class="banner-top">
      <span id="sessionBannerText"></span>
      <div class="banner-actions">
        <button class="banner-btn" id="shareBtn" title="分享連結">📤 分享</button>
        <button class="banner-btn" id="orderMgrBtn">📋 管理</button>
        <button class="banner-btn" id="sessionChangeBtn">🔄 換團</button>
      </div>
    </div>
    <div class="banner-stats" id="bannerStats"></div>
  </div>

  <!-- ── Main Content (dynamic) ── -->
  <div id="mainContent">

    <!-- Shown to organizer picking a shop -->
    <section class="pick-shop-section" id="pickShopSection" style="display:none">
      <div class="pick-shop-header">
        <h2 class="pick-shop-title">選擇今天要喝的飲料店</h2>
        <p class="pick-shop-sub">選好後，其他人加入訂單就會直接看到這家店的菜單</p>
      </div>
      <div class="shops-grid" id="pickShopGrid"></div>
    </section>

    <!-- Shown to joiner — direct ordering for the chosen shop -->
    <section class="joiner-section" id="joinerSection" style="display:none">
      <div class="joiner-shop-hero" id="joinerShopHero"></div>
      <button class="joiner-order-btn" id="joinerOrderBtn">開始點餐 →</button>
      <button class="browse-others-btn" id="browseOthersBtn">瀏覽其他飲料店菜單 ↓</button>
    </section>

    <!-- Browse all shops (read-only menus for joiners) -->
    <section class="browse-section" id="browseSection" style="display:none">
      <div class="browse-header">
        <h3 class="browse-title">其他飲料店菜單</h3>
        <p class="browse-sub">只供參考，本次訂單僅限主揪選的店家</p>
      </div>
      <div class="shops-grid" id="browseShopGrid"></div>
    </section>

  </div>

  <!-- ── 3-Step Modal ── -->
  <div class="modal-overlay" id="menuModal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div class="modal-shop-row">
          <div class="modal-logo-wrap"><img id="modalLogo" src="" alt="" /></div>
          <div>
            <h2 id="modalTitle" class="modal-title"></h2>
            <p id="modalDesc" class="modal-subtitle"></p>
          </div>
        </div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="steps-bar">
        <div class="step-item" id="si1"><div class="step-num">1</div><span class="step-lbl">瀏覽菜單</span></div>
        <div class="step-track"><div class="step-fill" id="fill1"></div></div>
        <div class="step-item" id="si2"><div class="step-num">2</div><span class="step-lbl">選擇品項</span></div>
        <div class="step-track"><div class="step-fill" id="fill2"></div></div>
        <div class="step-item" id="si3"><div class="step-num">3</div><span class="step-lbl">客製選項</span></div>
      </div>
      <div class="panel-container">
        <div class="step-panel" id="panel1"></div>
        <div class="step-panel" id="panel2"></div>
        <div class="step-panel" id="panel3"></div>
      </div>
      <div class="modal-footer">
        <button class="foot-btn back-btn" id="btnBack">← 返回</button>
        <div class="cart-pill" id="cartPill"><span id="cartCount">0</span> 項・$<span id="cartTotal">0</span></div>
        <button class="foot-btn next-btn" id="btnNext">開始點餐 →</button>
      </div>
    </div>
  </div>

  <!-- Order Summary Overlay -->
  <div class="summary-overlay" id="summaryOverlay">
    <div class="summary-box">
      <h2 class="summary-title">🧾 訂單明細</h2>
      <div class="summary-member-row" id="summaryMemberRow"></div>
      <div class="summary-items" id="summaryItems"></div>
      <div class="summary-total-row"><span>合計</span><span id="summaryTotal"></span></div>
      <button class="summary-confirm-btn" id="summaryConfirm">確認送出訂單</button>
      <button class="summary-back-btn" id="summaryBack">← 繼續點餐</button>
    </div>
  </div>

  <!-- Order Manager Overlay -->
  <div class="summary-overlay" id="orderMgrOverlay">
    <div class="summary-box">
      <div class="mgr-header">
        <h2 class="summary-title">📋 管理訂單</h2>
        <div class="mgr-tabs">
          <button class="mgr-tab active" id="mgrTabMembers">依成員</button>
          <button class="mgr-tab" id="mgrTabShop">叫貨單</button>
        </div>
      </div>
      <div id="orderMgrContent"></div>
      <div class="summary-total-row" id="orderMgrTotalRow">
        <span>全部合計</span><span id="orderMgrTotal"></span>
      </div>
      <div class="mgr-actions">
        <button class="mgr-action-btn" id="copyLineBtn">📋 複製 LINE 格式</button>
        <button class="mgr-action-btn outline" id="copyShopBtn">🧋 複製叫貨單</button>
      </div>
      <button class="summary-back-btn" id="orderMgrClose">← 關閉</button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="script.js?v=2"></script>
</body>
</html>
