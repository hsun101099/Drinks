<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>點飲料吧！</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Session Setup Overlay ── -->
  <div class="session-overlay" id="sessionOverlay">
    <div class="session-box">
      <div class="session-icon">🧋</div>
      <h1 class="session-app-name">點飲料吧！</h1>

      <div class="stabs">
        <button class="stab active" id="stabCreate">建立新訂單</button>
        <button class="stab" id="stabJoin">加入訂單</button>
      </div>

      <div class="spanel active" id="createPanel">
        <label class="field-label">你的名字</label>
        <input class="field-input" id="createName" placeholder="例：阿明、小花…" maxlength="12" />
        <label class="field-label">設定密碼</label>
        <input class="field-input" id="createCode" placeholder="請輸入數字密碼" maxlength="10" inputmode="numeric" pattern="[0-9]*" />
        <button class="session-submit-btn" id="createBtn">建立新訂單 →</button>
      </div>

      <div class="spanel" id="joinPanel">
        <label class="field-label">你的名字</label>
        <input class="field-input" id="joinName" placeholder="例：阿明、小花…" maxlength="12" />
        <label class="field-label">輸入訂單密碼</label>
        <input class="field-input" id="joinCode" placeholder="請輸入數字密碼" maxlength="10" inputmode="numeric" pattern="[0-9]*" />
        <p class="join-hint" id="joinHint"></p>
        <button class="session-submit-btn" id="joinBtn">加入訂單 →</button>
      </div>
    </div>
  </div>

  <nav class="navbar">
    <button class="nav-menu-btn">
      <span class="hamburger"></span>
      <span class="hamburger"></span>
      <span class="hamburger"></span>
    </button>
    <span class="nav-title">選單</span>
    <div class="nav-actions">
      <button class="nav-icon-btn" title="登入">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
      <button class="nav-icon-btn" title="購物車">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Session Banner -->
  <div class="session-banner" id="sessionBanner" style="display:none">
    <span id="sessionBannerText"></span>
    <button class="session-change-btn" id="orderMgrBtn">管理訂單</button>
    <button class="session-change-btn" id="sessionChangeBtn">換團</button>
  </div>

  <section class="hero">
    <div class="hero-content">
      <div class="hero-text">
        <p class="hero-sub">歡迎來到</p>
        <h1 class="hero-title">點飲料吧！</h1>
        <p class="hero-desc">精選台灣人氣品牌，團購最方便</p>
      </div>
    </div>
    <div class="hero-dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </section>

  <section class="shops-section">
    <div class="shops-grid" id="shopsGrid">

      <div class="shop-card" data-shop="50lan">
        <div class="card-logo"><img src="images/logo-50lan.png" alt="50嵐" /></div>
        <h3 class="card-name">50嵐</h3>
      </div>
      <div class="shop-card" data-shop="coco">
        <div class="card-logo"><img src="images/logo-coco.png" alt="CoCo都可" /></div>
        <h3 class="card-name">CoCo 都可</h3>
      </div>
      <div class="shop-card" data-shop="qingshan">
        <div class="card-logo"><img src="images/logo-qingshan.png" alt="青山" /></div>
        <h3 class="card-name">青山</h3>
      </div>
      <div class="shop-card" data-shop="milkshop">
        <div class="card-logo"><img src="images/logo-milkshop.png" alt="迷客夏" /></div>
        <h3 class="card-name">迷客夏</h3>
      </div>
      <div class="shop-card" data-shop="macu">
        <div class="card-logo"><img src="images/logo-macu.png" alt="MACU" /></div>
        <h3 class="card-name">MACU</h3>
      </div>
      <div class="shop-card" data-shop="kebuke">
        <div class="card-logo"><img src="images/logo-kebuke.png" alt="可不可熟成紅茶" /></div>
        <h3 class="card-name">可不可熟成紅茶</h3>
      </div>
      <div class="shop-card" data-shop="guiji">
        <div class="card-logo"><img src="images/logo-guiji.png" alt="龜記" /></div>
        <h3 class="card-name">龜記 GUIJI</h3>
      </div>
      <div class="shop-card" data-shop="qingfuquan">
        <div class="card-logo"><img src="images/logo-qingfuquan.png" alt="清心福全" /></div>
        <h3 class="card-name">清心福全</h3>
      </div>
      <div class="shop-card" data-shop="comebuy">
        <div class="card-logo"><img src="images/logo-comebuy.png" alt="COMEBUY" /></div>
        <h3 class="card-name">COMEBUY</h3>
      </div>

    </div>
  </section>

  <!-- ── 3-Step Modal ── -->
  <div class="modal-overlay" id="menuModal">
    <div class="modal">

      <div class="modal-handle"></div>

      <div class="modal-header">
        <div class="modal-shop-row">
          <div class="modal-logo-wrap">
            <img id="modalLogo" src="" alt="" />
          </div>
          <div>
            <h2 id="modalTitle" class="modal-title"></h2>
            <p id="modalDesc" class="modal-subtitle"></p>
          </div>
        </div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>

      <div class="steps-bar">
        <div class="step-item" id="si1">
          <div class="step-num">1</div>
          <span class="step-lbl">瀏覽菜單</span>
        </div>
        <div class="step-track"><div class="step-fill" id="fill1"></div></div>
        <div class="step-item" id="si2">
          <div class="step-num">2</div>
          <span class="step-lbl">選擇品項</span>
        </div>
        <div class="step-track"><div class="step-fill" id="fill2"></div></div>
        <div class="step-item" id="si3">
          <div class="step-num">3</div>
          <span class="step-lbl">客製選項</span>
        </div>
      </div>

      <div class="panel-container">
        <div class="step-panel" id="panel1"></div>
        <div class="step-panel" id="panel2"></div>
        <div class="step-panel" id="panel3"></div>
      </div>

      <div class="modal-footer">
        <button class="foot-btn back-btn" id="btnBack">← 返回</button>
        <div class="cart-pill" id="cartPill">
          <span id="cartCount">0</span> 項・$<span id="cartTotal">0</span>
        </div>
        <button class="foot-btn next-btn" id="btnNext">開始點餐 →</button>
      </div>

    </div>
  </div>

  <!-- Order Summary Overlay -->
  <div class="summary-overlay" id="summaryOverlay">
    <div class="summary-box">
      <h2 class="summary-title">🧾 訂單明細</h2>
      <div class="summary-member-row" id="summaryMemberRow"></div>
      <div class="summary-items" id="summaryItems"></div>
      <div class="summary-total-row">
        <span>合計</span>
        <span id="summaryTotal"></span>
      </div>
      <button class="summary-confirm-btn" id="summaryConfirm">確認送出訂單</button>
      <button class="summary-back-btn" id="summaryBack">← 繼續點餐</button>
    </div>
  </div>

  <!-- Order Manager Overlay -->
  <div class="summary-overlay" id="orderMgrOverlay">
    <div class="summary-box">
      <h2 class="summary-title">📋 管理訂單</h2>
      <div id="orderMgrContent"></div>
      <div class="summary-total-row" id="orderMgrTotalRow">
        <span>全部合計</span>
        <span id="orderMgrTotal"></span>
      </div>
      <button class="summary-back-btn" id="orderMgrClose">← 關閉</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
